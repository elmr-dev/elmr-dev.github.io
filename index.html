<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>elmr.dev — Ham radio software, rebuilt for everywhere.</title>
    <meta
      name="description"
      content="Elmr builds modern, cross-platform ham radio software, in the open. Morse is the first thing."
    />
    <meta property="og:title" content="elmr.dev" />
    <meta
      property="og:description"
      content="Ham radio software, rebuilt for everywhere — modern, cross-platform, built in the open."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://elmr.dev" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="theme-color" content="#f5f5ff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0f0f1a" media="(prefers-color-scheme: dark)" />
    <script>
      // Apply saved/system theme before paint to avoid a flash of the wrong theme.
      (function () {
        try {
          var saved = localStorage.getItem("elmr-theme");
          var dark = saved
            ? saved === "dark"
            : window.matchMedia("(prefers-color-scheme: dark)").matches;
          if (dark) document.documentElement.setAttribute("data-theme", "dark");
        } catch (e) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=Instrument+Sans:wght@400;500;600&family=Azeret+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <canvas id="grid-bg" aria-hidden="true"></canvas>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
