    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "elmr",
        "url": "https://elmr.dev/",
        "logo": "https://elmr.dev/og.png",

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="theme-color"
      content="#f5f5ff"
      media="(prefers-color-scheme: light)"
    />
    <meta
      name="theme-color"
      content="#0f0f1a"
      media="(prefers-color-scheme: dark)"
    />
    <script>
      // Apply saved/system theme before paint to avoid a flash of the wrong theme.
      (() => {
        try {
          const saved = localStorage.getItem("elmr-theme");
          // Default to dark; honor an explicit saved choice if present.
          const dark = saved ? saved === "dark" : true;
          if (dark) document.documentElement.setAttribute("data-theme", "dark");
        } catch {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=Instrument+Sans:wght@400;500;600&family=Azeret+Mono:wght@400;500;600;700&display=swap"
